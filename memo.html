<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自分専用ノートアプリ (ver0.7.1)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@excalidraw/excalidraw/dist/excalidraw.production.min.js"></script>

    <style>
        /* iPadでの操作を安定させるスタイル */
        body { margin: 0; padding: 10px; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #excalidraw-container {
            height: 400px;
            width: 100%;
            border: 2px solid #007bff;
            touch-action: none; /* ← ペン操作をブラウザから守る */
            pointer-events: auto; /* ← 入力を許可する */
            overscroll-behavior: none;
        }
        
        #editor { width: 100%; height: 150px; }
    </style>
</head>
<body>

    <h1>自分専用ノートアプリ <span style="color:#888;">ver0.7.1</span></h1>
    <input type="password" id="token" placeholder="GitHub Tokenを入力">
    <button onclick="saveToken()">設定保存</button>
    
    <textarea id="editor" placeholder="ここにメモを入力"></textarea>
    
    <h3>手書きボード</h3>
    <div id="excalidraw-container"></div>
    
    <br>
    <button onclick="saveNote()" style="padding: 15px; width: 100%; font-size: 18px;">GitHubに保存</button>

    <script>
        const { createElement } = React;
        const { createRoot } = ReactDOM;
        const { Excalidraw } = ExcalidrawLib;

        // Excalidrawを表示
        const container = document.getElementById("excalidraw-container");
        createRoot(container).render(createElement(Excalidraw, {}));

        function saveToken() {
            localStorage.setItem('github_token', document.getElementById('token').value);
            alert('トークンを保存しました');
        }

        async function saveNote() {
            const token = localStorage.getItem('github_token');
            if (!token) return alert("トークンを設定してください");

            const owner = "IBK-1412";
            const repo = "memoweb";
            const path = "notes/memo.md";
            
            const content = document.getElementById('editor').value;
            const encodedContent = btoa(unescape(encodeURIComponent(content)));
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                let sha = null;
                const getResponse = await fetch(url, { headers: { Authorization: `token ${token}` }});
                if (getResponse.ok) sha = (await getResponse.json()).sha;

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "update v0.7.1", content: encodedContent, sha: sha })
                });

                if (response.ok) alert("保存成功！");
                else alert("保存失敗: " + (await response.json()).message);
            } catch (err) { alert("エラーが発生しました"); }
        }
    </script>
</body>
</html>
