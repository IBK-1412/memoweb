<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>自分専用ノートアプリ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@excalidraw/excalidraw/dist/excalidraw.production.min.js"></script>

    <style>
        /* CSSはここにまとめました */
        body { padding: 20px; font-family: sans-serif; }
        #excalidraw-container {
            height: 500px;
            width: 100%;
            border: 1px solid #ccc;
            touch-action: none; /* iPadでのスクロール防止 */
            overscroll-behavior: none;
        }
        #editor { width: 100%; height: 200px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>自分専用ノートアプリ</h1>
    <input type="password" id="token" placeholder="GitHub Tokenを入力">
    <button onclick="saveToken()">設定保存</button>
    
    <hr>
    
    <textarea id="editor" placeholder="ここにメモを入力"></textarea>
    <p>文字数: <span id="count">0</span></p>

    <h3>手書きボード</h3>
    <div id="excalidraw-container"></div>
    
    <br>
    <button onclick="saveNote()" style="padding: 10px 20px; font-size: 16px;">GitHubに保存</button>

    <script>
        // --- 1. 文字数カウント ---
        document.getElementById('editor').addEventListener('input', (e) => {
            document.getElementById('count').innerText = e.target.value.length;
        });

        // --- 2. Excalidrawの初期化 ---
        const { createElement } = React;
        const { createRoot } = ReactDOM;
        const { Excalidraw } = ExcalidrawLib;

        const App = () => createElement(Excalidraw, {});
        const container = document.getElementById("excalidraw-container");
        createRoot(container).render(createElement(App));

        // --- 3. トークンの保存 ---
        function saveToken() {
            const token = document.getElementById('token').value;
            localStorage.setItem('github_token', token);
            alert('トークンを保存しました');
        }

        // --- 4. 保存処理 ---
        async function saveNote() {
            const token = localStorage.getItem('github_token');
            if (!token) {
                alert("先にトークンを設定してください");
                return;
            }

            const owner = "IBK-1412";
            const repo = "memoweb";
            const path = "notes/memo.md";
            
            const content = document.getElementById('editor').value;
            const encodedContent = btoa(unescape(encodeURIComponent(content)));
            
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                let sha = null;
                const getResponse = await fetch(url, {
                    headers: { Authorization: `token ${token}` }
                });
                
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                }

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        Authorization: `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "update note via web app",
                        content: encodedContent,
                        sha: sha
                    })
                });

                if (response.ok) {
                    alert("保存成功！");
                } else {
                    const error = await response.json();
                    alert("保存失敗: " + error.message);
                }
            } catch (err) {
                console.error(err);
                alert("エラーが発生しました");
            }
        }
    </script>
</body>
</html>
