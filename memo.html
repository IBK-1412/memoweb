<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notebook v1.0 (tldraw)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/tldraw@3.2.0/tldraw.css">
</head>
<body style="margin:0; height:100vh; overflow:hidden;">

    <div id="tldraw-root" style="width: 100%; height: 100%;"></div>

    <script type="module">
        import { Tldraw, createTLStore, defaultShapeUtils } from 'https://unpkg.com/tldraw@3.2.0/tldraw.js';

        // スマート描画（自動補正）を有効にしてtldrawを表示
        const container = document.getElementById('tldraw-root');
        
        // Reactの代わりにtldraw専用のレンダリングを使用
        function App() {
            return Tldraw({
                persistenceKey: 'my-note-app', // ブラウザ内での保存用ID
                initialState: 'hand', // 最初から手書きモード
            });
        }
    </script>
</body>
</html>
